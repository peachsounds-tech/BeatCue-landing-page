<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Cue</title>
    <link rel="icon" type="image/png" href="../icon.png">
    <script>
        // ============================================
        // PRODUCT REDIRECT
        // Change this URL when switching from early access to paid product.
        // During early access: points to LemonSqueezy free checkout
        // After launch: point to the paid checkout URL
        // ============================================
        const PRODUCT_URL = 'https://cue-app.lemonsqueezy.com/checkout/buy/8dfc09d0-cfd1-4a5c-83b0-55ebc6efcbfc';

        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const redirectUrl = email
            ? PRODUCT_URL + '?checkout[email]=' + encodeURIComponent(email)
            : PRODUCT_URL;

        window.location.replace(redirectUrl);
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0;url=https://cue-app.lemonsqueezy.com/checkout/buy/8dfc09d0-cfd1-4a5c-83b0-55ebc6efcbfc">
    </noscript>
</head>
<body>
    <p>Redirecting to Cue...</p>
</body>
</html>
