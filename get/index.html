<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18317916073"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-18317916073');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Cue</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script>
        // ============================================
        // PRODUCT REDIRECT
        // Change this URL when switching from early access to paid product.
        // During early access: points to LemonSqueezy free checkout
        // After launch: point to the paid checkout URL
        // ============================================
        const PRODUCT_URL = 'https://beatcue.lemonsqueezy.com/checkout/buy/5585ea8e-18e3-4608-ab13-fb9bac5f36c4';

        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const redirect = new URL(PRODUCT_URL);
        if (email) redirect.searchParams.set('checkout[email]', email);
        // Keep Google/Meta click IDs on the checkout URL so attribution can
        // survive the hop off beatcue.app (and so gtag on this page sees them
        // before navigation).
        ['gclid', 'gbraid', 'wbraid', 'fbclid'].forEach(function (k) {
            const v = params.get(k);
            if (v) redirect.searchParams.set(k, v);
        });

        window.location.replace(redirect.toString());
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0;url=https://beatcue.lemonsqueezy.com/checkout/buy/5585ea8e-18e3-4608-ab13-fb9bac5f36c4">
    </noscript>
</head>
<body>
    <p>Redirecting to Cue...</p>
</body>
</html>
