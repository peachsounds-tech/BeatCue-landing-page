name = "peachsounds-webhook"
main = "worker.js"
compatibility_date = "2024-01-01"

# Uncomment and set your account_id if needed
# account_id = "your-cloudflare-account-id"

[vars]
# Non-secret environment variables go here
# POSTHOG_API_KEY is hardcoded in worker.js for simplicity

# Secret variables (set via `wrangler secret put NAME`):
#
#   LEMONSQUEEZY_WEBHOOK_SECRET    Lemon Squeezy → /webhook/lemonsqueezy HMAC.
#                                  Optional; signature check is skipped when
#                                  unset.
#
#   META_PIXEL_ID                  Meta Pixel numeric ID for /capi events.
#                                  Must be set; /capi returns 503 otherwise.
#                                  Today: 708429622326201 (matches the pixel
#                                  loaded from landing-page/download.html).
#
#   META_CAPI_TOKEN                Conversions API access token. Generate in
#                                  Events Manager → Settings → Conversions API
#                                  → "Generate access token". Treat as a
#                                  password — never commit, never ship to the
#                                  desktop app or browser.
#
#   META_TEST_EVENT_CODE           Optional. Set during verification so events
#                                  land in Events Manager → Test Events
#                                  instead of prod attribution. Delete with
#                                  `wrangler secret delete META_TEST_EVENT_CODE`
#                                  once the integration is verified.

# ─── Pairing KV ───────────────────────────────────────────────────────────────
# Stores pending web→app pairing payloads (bcid + Meta attribution) for ~30
# minutes between download and first app launch. One write per download, one
# read+delete per first launch. Free tier (1k writes/day) is plenty until
# >1k installs/day.
#
# First-time setup:
#   1. wrangler kv namespace create PAIRINGS
#      → prints an `id = "..."` line; paste it into the binding below.
#   2. wrangler kv namespace create PAIRINGS --preview
#      → prints a `preview_id = "..."` line; paste that for `wrangler dev`.
#   3. wrangler deploy
[[kv_namespaces]]
binding = "PAIRINGS"
id = "ec35a8800c954b81a7c3d2a3512b5cd6"
preview_id = "abf00fa20f7347dcbe0f3a2d70c90fb1"

# ─── Static assets opt-out ────────────────────────────────────────────────────
# Wrangler v4 auto-prompts "Workers with static assets?" when no [assets]
# block is present and a sibling/parent folder looks asset-like. In CI /
# non-interactive shells the prompt auto-answers yes, which makes wrangler
# walk up to ../landing-page (3700+ files, including a 34 MiB .mov) and
# fail with "Asset too large". This worker is a pure API endpoint with no
# static surface, so we point [assets] at a deliberately empty local dir
# to short-circuit that scan.
[assets]
directory = "./empty-assets"


