            keys.forEach(function(k) { var v = params.get(k); if (v) utms[k] = v; });
            if (Object.keys(utms).length > 0) {
                window.__cue_initial_utms = utms;

                } catch(e) {}

    <style>
        :root {
            --wave-blue: #4A90D9;

            margin-bottom: 1rem;
        }

            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.55rem 0;
        }

        .dl-check-box {
            width: 20px; height: 20px; flex-shrink: 0;
            border-radius: 6px; border: 1.5px solid var(--border-light);
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.35s ease;
        }
        .dl-check-box svg { opacity: 0; transform: scale(0.5); transition: all 0.3s ease; }
        .dl-check.checked .dl-check-box {
            background: var(--green-soft); border-color: var(--green-border);
        }
        .dl-check.checked .dl-check-box svg { opacity: 1; transform: scale(1); }
        .dl-check.active .dl-check-box {
            border-color: #F59E0B; background: rgba(245, 158, 11, 0.06);
        }
        .dl-check.active .dl-check-box::after {
            content: ''; width: 8px; height: 8px; border-radius: 50%;
            background: #F59E0B;
        }
        .dl-check.active .dl-check-box svg { display: none; }
        .dl-check.active .dl-check-label { font-weight: 600; }
        .dl-check-label {
            font-size: 0.92rem; line-height: 1.4; color: var(--text-primary);
            transition: opacity 0.35s ease;
        }
        .dl-check.checked .dl-check-label {
            text-decoration: line-through; color: var(--text-muted); opacity: 0.5;
        }
        .dl-check-spinner {
            width: 16px; height: 16px; flex-shrink: 0;
            border: 1.5px solid var(--border-light); border-top-color: var(--wave-blue);
            border-radius: 50%; animation: spin 0.7s linear infinite;
            display: none;
        }
        .dl-check.loading .dl-check-box { display: none; }
        .dl-check.loading .dl-check-spinner { display: block; }

            100% { box-shadow: 0 0 0 0 rgba(0, 120, 212, 0); }
        }
        .security-tip.attention {
            border-color: rgba(0, 120, 212, 0.55);
            animation: securityPulse 1.6s ease-out 2;
        }

        body.windows-mode .dl-icon { width: 96px; height: 96px; margin-bottom: 0.6rem; }

        .mobile-send-actions { display: flex; flex-direction: column; gap: 0.5rem; width: 100%; }
        .mobile-action-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.8rem 1rem; font-size: 1.1rem; font-weight: 600; font-family: inherit; border-radius: 10px; cursor: pointer; transition: transform 0.15s ease; text-decoration: none; }
        .mobile-action-primary { background: var(--wave-blue); color: white; border: none; }
        .mobile-action-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-light); }
        .mobile-action-tertiary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-light); font-weight: 500; }
        .mobile-action-btn:active { transform: scale(0.97); }
        .mobile-copy-toast { display: none; margin-top: 0.75rem; padding: 0.6rem 0.9rem; background: var(--green-soft); border: 1px solid var(--green-border); border-radius: 10px; color: var(--green); font-size: 1.02rem; font-weight: 500; }
        .mobile-copy-toast.show { display: block; }
        .mobile-cta-footer { margin-top: 1.25rem; font-size: 0.9rem; color: var(--text-secondary); opacity: 0.65; }

        @media (max-width: 480px) {
            body { padding: 1.5rem 1rem; }
            h1 { font-size: 1.35rem; }
            .dl-card { padding: 1.1rem 1.2rem; }
        }
    </style>

            <div class="dl-icon">
                <img src="icon1.png" alt="BeatCue">
            </div>

            <h1 id="downloadPageTitle">Downloading BeatCue</h1>
            <p class="dl-subtitle" id="dlSubtitle">Free to use &middot; Email required on export</p>

            <div class="dl-card">
                <div class="dl-checklist" id="dlChecklist">
                    <div class="dl-check loading" id="checkDownload">
                        <div class="dl-check-spinner"></div>
                        <div class="dl-check-box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                        <div class="dl-check-label">Download BeatCue</div>
                    </div>
                    <div class="dl-check" id="checkInstall">
                        <div class="dl-check-spinner"></div>
                        <div class="dl-check-box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                        <div class="dl-check-label" id="checkInstallLabel">Run the installer</div>
                    </div>
                    <div class="dl-check" id="checkEdit">
                        <div class="dl-check-spinner"></div>
                        <div class="dl-check-box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
                        <div class="dl-check-label">Start editing</div>
                    </div>
                </div>
            </div>

            <p class="dl-fallback" id="dlFallback">
                Download didn't start? <a href="#" id="manualDownloadLink">Click here</a>
            </p>

            <div class="security-tip" id="securityTip" style="display: none;">
                <div class="security-tip-header" id="securityTipHeader"></div>
                <div class="security-tip-body" id="securityTipBody"></div>
            </div>

        </div>

        <div id="unsupportedContent" style="display: none;">
            <div class="dl-icon">
                <img src="icon1.png" alt="BeatCue">
            </div>
            <div class="mobile-transfer-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <p class="mobile-cta-sub mobile-cta-platform">BeatCue runs on macOS & Windows</p>
            <p class="mobile-cta-heading">Continue on your computer</p>
            <div class="mobile-send-actions">
                <button class="mobile-action-btn mobile-action-primary" id="mobileShareBtn" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    <span id="mobileShareText">Share download link</span>
                </button>
            </div>
            <div class="mobile-copy-toast" id="mobileCopyToast">Link copied. Open it on your computer.</div>
            <p class="mobile-cta-footer">Mac & Windows &middot; Recommended: macOS 14+</p>
        </div>

    </div>

    <script src="/js/microsoft-store.js"></script>
    <script>
        const DOWNLOAD_URLS = {
            macos: 'https://github.com/peachsounds-tech/cue-releases/releases/latest/download/beatcue-installer.pkg',
            // Windows now ships via the Microsoft Store. This is a top-level
            // page navigation (not a file download) — init() does a same-tab
            // redirect after firing the pixel/PostHog/pairing so popup
            // blockers can't kill it. The manual fallback link is wired off
            // this same URL.
            windows: 'https://apps.microsoft.com/detail/9nrc99fw338g'
        };

        function getWindowsStoreUrl() {
            if (window.CueMicrosoftStore) {
                // Pack the bcid into the cid so the desktop app can read it
                // back via WinRT GetAppPurchaseCampaignIdAsync() on first
                // launch. The IP-coarsened /pairings/claim path remains a
                // fallback for installs where the cid round-trip fails.
                return window.CueMicrosoftStore.buildMicrosoftStoreUrl(getUtmProps, window.__cue_bcid);
            }
            return DOWNLOAD_URLS.windows;
        }
        
        const PLATFORM_INFO = {
            macos: { name: 'macOS' },
            windows: { name: 'Windows' }
        };

        // Base URL of the pairing worker (Cloudflare Workers). Stores the
        // bcid + Meta attribution under a (coarse_ip, os) key so the freshly
        // installed desktop app can claim it on first launch.
        // TODO: bind a custom subdomain (e.g. https://api.beatcue.app) and update
        // here + in Source/PluginProcessor.cpp (kPairingsBase).
        const PAIRINGS_BASE = 'https://peachsounds-webhook.sareldu.workers.dev';

        // Check if Windows downloads should be blocked (force_mac=true)
        const urlParams = new URLSearchParams(window.location.search);
        const forceMac = urlParams.get('force_mac') === 'true';

        // Fire-and-forget: hand the current attribution payload to the worker
        // so the desktop app can claim it on first launch. Idempotent — repeat
        // calls just overwrite the same KV entry. Failures are silent because
        // a missed pairing only costs us a single anonymous app session.
        function postPairing(platform) {
            try {
                var bcid = window.__cue_bcid;
                if (!bcid) return;

                // Re-read at click time as a safety net. By now fbevents.js
                // has typically had seconds to initialize and write _fbp,
                // and our own pre-created cookie is also persisted. The
                // cached globals remain a fallback for environments that
                // disallow cookie reads.
                var freshFbp = getCookie('_fbp') || window.__cue_fbp || null;
                var freshFbc = getCookie('_fbc') || window.__cue_fbc || null;

                var googleClickIds = getGoogleClickIds();

                var payload = {
                    bcid: bcid,
                    fbp: freshFbp,
                    fbc: freshFbc,
                    fbclid: window.__cue_fbclid || null,
                    gclid: googleClickIds.gclid || null,
                    gbraid: googleClickIds.gbraid || null,
                    wbraid: googleClickIds.wbraid || null,
                    utms: getUtmProps(),
                    platform: platform
                };

                fetch(PAIRINGS_BASE + '/pairings', {
                    method: 'POST',
                    mode: 'cors',
                    credentials: 'omit',
                    keepalive: true,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(function() {});
            } catch (e) { /* never block download on a pairing hiccup */ }
        }

        // Tunable: every 3s we ask the worker if this bcid was claimed by a
        // freshly launched desktop app. We give up after 10 minutes of wall
        // time, and pause polling whenever the tab is hidden so we don't
        // burn battery in the background. Single in-flight request at a time.
        var PAIRING_POLL_INTERVAL_MS = 3000;
        var PAIRING_POLL_MAX_MS      = 10 * 60 * 1000;

        var pairingPoll = {
            timer:    null,
            inflight: false,
            startedAt: 0,
            bcid:     null,
            done:     false,
        };

        function markPairedInChecklist() {
            // Successful pairing implies installer ran AND app launched, so
            // collapse the middle "active" state into a check too.
            var install = document.getElementById('checkInstall');
            if (install) {
                install.classList.remove('active', 'loading');
                install.classList.add('checked');
            }
            var edit = document.getElementById('checkEdit');
            if (edit) {
                edit.classList.remove('active', 'loading');
                edit.classList.add('checked');
            }
        }

        function stopPairingPoll() {
            if (pairingPoll.timer) {
                clearInterval(pairingPoll.timer);
                pairingPoll.timer = null;
            }
        }

        function checkPairingOnce() {
            if (pairingPoll.done || pairingPoll.inflight) return;
            if (Date.now() - pairingPoll.startedAt > PAIRING_POLL_MAX_MS) {
                pairingPoll.done = true;
                stopPairingPoll();
                return;
            }
            if (document.hidden) return; // resume on visibilitychange
            if (!pairingPoll.bcid) return;

            pairingPoll.inflight = true;
            fetch(PAIRINGS_BASE + '/pairings/claimed/' + encodeURIComponent(pairingPoll.bcid), {
                method: 'GET',
                mode: 'cors',
                credentials: 'omit',
                cache: 'no-store',
            })
                .then(function(r) {
                    if (r.status === 200) return r.json();
                    return null;
                })
                .then(function(json) {
                    if (json && json.ok) {
                        pairingPoll.done = true;
                        stopPairingPoll();
                        markPairedInChecklist();
                        if (typeof posthog !== 'undefined' && posthog.capture) {
                            posthog.capture('pairing_observed_in_page', {
                                ...getBaseEventProps(),
                                bcid: pairingPoll.bcid,
                                latency_ms: Date.now() - pairingPoll.startedAt,
                            });
                        }
                    }
                })
                .catch(function() { /* network blip — try again next tick */ })
                .finally(function() { pairingPoll.inflight = false; });
        }

        function startPairingPoll() {
            if (pairingPoll.timer || pairingPoll.done) return;
            var bcid = window.__cue_bcid;
            if (!bcid) return;
            pairingPoll.bcid = bcid;
            pairingPoll.startedAt = Date.now();
            // First check is immediate so a refresh after pairing already
            // happened ticks the bullet without waiting a full interval.
            checkPairingOnce();
            pairingPoll.timer = setInterval(checkPairingOnce, PAIRING_POLL_INTERVAL_MS);
        }

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) checkPairingOnce();
        });

        // Collect Google click IDs, preferring (1) the current URL, then
        // (2) the original landing URL, then (3) Google's first-party _gcl
        // cookies. Used both to attribute the conversion page and to seed the
        // mobile→desktop hand-off link so a phone ad click can be credited to
        // the download that happens later on the user's computer.
        function getGoogleClickIds() {
            var out = {};
            var sources = [window.location.search];
            if (window.__cue_initial_url) {
                try { sources.push(new URL(window.__cue_initial_url).search); } catch (e) {}
            }
            function fromCookie(cookieName) {
                try {
                    var m = document.cookie.match(new RegExp('(?:^|; )' + cookieName + '=([^;]+)'));
                    if (!m) return null;
                    // _gcl_aw / _gcl_gb look like GCL.<ts>.<id>
                    var parts = decodeURIComponent(m[1]).split('.');
                    return parts.length >= 3 ? parts.slice(2).join('.') : null;
                } catch (e) { return null; }
            }
            var cookieFallback = {
                gclid:  fromCookie('_gcl_aw'),
                gbraid: fromCookie('_gcl_gb'),
                wbraid: fromCookie('_gcl_gb')
            };
            ['gclid', 'gbraid', 'wbraid'].forEach(function (key) {
                var val = null;
                for (var i = 0; i < sources.length; i++) {
                    val = new URLSearchParams(sources[i]).get(key);
                    if (val) break;
                }
                if (!val) val = cookieFallback[key];
                if (val) out[key] = val;
            });
            return out;
        }

        // Build the URL a mobile user hands off to their computer (WhatsApp /
        // copy / email). Carries the same bcid plus the ad click IDs so the
        // desktop page adopts them: bcid is reused as-is by getOrCreateBcid(),
        // fbclid is turned back into _fbc by getFbc(), and gclid rides through
        // to the Google Ads conversion + the pairing record for the app.
        function buildDesktopHandoffUrl() {
            var u = new URL('https://beatcue.app/download');
            if (window.__cue_bcid)   u.searchParams.set('bcid', window.__cue_bcid);
            if (window.__cue_fbclid) u.searchParams.set('fbclid', window.__cue_fbclid);
            var g = getGoogleClickIds();
            Object.keys(g).forEach(function (k) { u.searchParams.set(k, g[k]); });
            var utms = getUtmProps();
            Object.keys(utms).forEach(function (k) { if (utms[k]) u.searchParams.set(k, utms[k]); });
            return u.toString();
        }

        // Google Ads: only count real macOS downloads / Windows Store redirects.
        // Mobile "continue on your computer" visits must NOT hit this URL.
        // Point Ads optimization at https://beatcue.app/download-converted.html
        // (not download.html). Optional: paste your event conversion send_to
        // label below once you create a "Download started" conversion action.
        var GOOGLE_ADS_DOWNLOAD_SEND_TO = ''; // e.g. 'AW-18317916073/AbCdEfGhIjKlMnOp'

        function fireGoogleAdsDownloadConversion(platform) {
            if (window.__cue_gads_download_fired) return;
            window.__cue_gads_download_fired = true;

            if (typeof gtag === 'function') {
                gtag('event', 'trial_download_started', {
                    platform: platform,
                    source: 'download_page'
                });
                if (GOOGLE_ADS_DOWNLOAD_SEND_TO) {
                    gtag('event', 'conversion', {
                        send_to: GOOGLE_ADS_DOWNLOAD_SEND_TO,
                        value: 0.0,
                        currency: 'USD'
                    });
                }
            }

            // URL-based Ads goals: load conversion URL only after a real download.
            // Forward Google click IDs so download-converted.html can attribute
            // the conversion (page-load goals / Tag Assistant expect gclid here).
            try {
                var convUrl = new URL('/download-converted.html', window.location.origin);
                convUrl.searchParams.set('platform', platform);
                convUrl.searchParams.set('source', 'download_page');

                var clickIds = getGoogleClickIds();
                Object.keys(clickIds).forEach(function (key) {
                    convUrl.searchParams.set(key, clickIds[key]);
                });

                var iframe = document.createElement('iframe');
                iframe.src = convUrl.pathname + convUrl.search;
                iframe.width = 0;
                iframe.height = 0;
                iframe.setAttribute('aria-hidden', 'true');
                iframe.style.cssText = 'display:none;visibility:hidden;position:absolute;left:-9999px;border:0;';
                document.body.appendChild(iframe);
            } catch (e) { /* never block download for analytics */ }

            console.log('📊 Google Ads: download conversion fired', { platform: platform });
        }

        function trackMobileDownloadBlocked(platform) {
            if (window.__cue_gads_mobile_blocked_fired) return;
            window.__cue_gads_mobile_blocked_fired = true;
            if (typeof gtag === 'function') {
                gtag('event', 'mobile_download_blocked', {
                    platform: platform,
                    source: 'download_page'
                });
            }
            if (typeof posthog !== 'undefined' && posthog.capture) {
                posthog.capture('mobile_download_blocked', {
                    ...getBaseEventProps(),
                    page: 'download',
                    platform: platform,
                    source: 'download_page'
                });
            }
            console.log('📊 Google Ads: mobile download blocked (not a conversion)', { platform: platform });
        }

        function trackDownload(platform) {
            if (typeof fbq === 'function') {
                var eventData = { 
                    value: '0.00', 
                    currency: 'USD', 
                    content_name: 'BeatCue', 
                    platform: platform 
                };
                fbq('track', 'StartTrial', eventData);
                console.log('📊 Meta Pixel: StartTrial tracked', eventData);
            }

            fireGoogleAdsDownloadConversion(platform);

            var props = { ...getBaseEventProps(), page: 'download', platform: platform, url: window.location.href, source: 'free_trial_page' };
            if (platform === 'windows') {
                props.ms_store_url = getWindowsStoreUrl();
                if (window.CueMicrosoftStore) {
                    var cid = window.CueMicrosoftStore.getMetaCampaignCid(getUtmProps, window.__cue_bcid);
                    if (cid) props.ms_store_cid = cid;
                }
            }
            if (window.__cue_fbclid) props.fbclid = window.__cue_fbclid;
            posthog.capture('trial_download_started', props);

            postPairing(platform);
            startPairingPoll();
        }

        function setupUI(platform) {
            var isSupported = platform === 'macos' || platform === 'windows';
            
            // Block Windows downloads if force_mac=true
            var blockWindowsDownload = forceMac && platform === 'windows';

            if (blockWindowsDownload) {
                // Show "Windows coming soon" message
                document.getElementById('supportedContent').style.display = 'block';
                document.getElementById('unsupportedContent').style.display = 'none';
                
                document.getElementById('downloadPageTitle').textContent = 'Windows Coming Soon';
                document.getElementById('dlSubtitle').textContent = 'BeatCue is currently available for macOS only';
                
                // Hide the checklist
                var checklist = document.getElementById('dlChecklist');
                if (checklist) checklist.style.display = 'none';
                
                // Hide fallback link
                var fallback = document.getElementById('dlFallback');
                if (fallback) fallback.style.display = 'none';
                
                var securityTipEl = document.getElementById('securityTip');
                if (securityTipEl) {
                    securityTipEl.style.display = '';
                    document.getElementById('securityTipHeader').innerHTML = '🪟 Windows version in development';
                    document.getElementById('securityTipBody').innerHTML = 'We\'re working on bringing BeatCue to Windows.<br>In the meantime, BeatCue is available for <strong>macOS 14+</strong>.';
                }
                
            } else if (isSupported) {
                document.getElementById('supportedContent').style.display = 'block';
                document.getElementById('unsupportedContent').style.display = 'none';

                var otherPlatform = platform === 'macos' ? 'windows' : 'macos';
                var otherInfo = PLATFORM_INFO[otherPlatform];

                var manualLink = document.getElementById('manualDownloadLink');
                manualLink.href = platform === 'windows' ? getWindowsStoreUrl() : DOWNLOAD_URLS[platform];
                manualLink.addEventListener('click', function() {
                    trackDownload(platform);
                });


                if (platform === 'windows') {
                    document.body.classList.add('windows-mode');

                    // Windows users get a fast same-tab redirect to the
                    // Microsoft Store (see init() below). This copy is for
                    // the brief flash before the redirect lands.
                    document.getElementById('downloadPageTitle').textContent = 'Opening the Microsoft Store…';
                    document.getElementById('dlSubtitle').textContent = 'Tap Get to install BeatCue \u00b7 Free to use';

                    var securityTipEl = document.getElementById('securityTip');
                    if (securityTipEl) securityTipEl.style.display = '';
                    document.getElementById('securityTipHeader').innerHTML = '🎉 You\'re almost in!';
                    document.getElementById('securityTipBody').innerHTML = 'Redirecting you to the <strong>Microsoft Store</strong>…<br>Tap <strong>"Get"</strong> (or <strong>"Install"</strong>) to add BeatCue to your PC.';
                }
                
            } else {
                document.getElementById('supportedContent').style.display = 'none';
                document.getElementById('unsupportedContent').style.display = 'block';
                trackMobileDownloadBlocked(platform);
            }
        }
        
        function init() {
            var platform = detectedPlatform;
            setupUI(platform);
            
            // Block Windows downloads if force_mac=true
            var blockWindowsDownload = forceMac && platform === 'windows';

            if ((platform === 'macos' || platform === 'windows') && !blockWindowsDownload) {
                if (platform === 'windows') {
                    // Windows ships via the Microsoft Store. Fire the same
                    // pixel + PostHog + pairing flow we use for macOS, then
                    // do a same-tab top-level redirect to the Store. The
                    // pairing POST uses keepalive:true so it survives the
                    // navigation. The ~1.5s pause lets the "Opening the
                    // Microsoft Store…" copy read as intentional rather
                    // than an instant pop. No popup, no blocker.
                    trackDownload('windows');
                    setTimeout(function() {
                        window.location.href = getWindowsStoreUrl();
                    }, 1500);
                    return;
                }

                setTimeout(function() {
                    var a = document.createElement('a');
                    a.href = DOWNLOAD_URLS[platform];
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    trackDownload(platform);

                    setTimeout(function() {
                        var chk = document.getElementById('checkDownload');
                        if (chk) { chk.classList.remove('loading'); chk.classList.add('checked'); }

                        document.getElementById('downloadPageTitle').textContent = 'Downloading BeatCue';
                        document.getElementById('dlSubtitle').textContent = 'Free to use \u00b7 Email required on export';

                        var installItem = document.getElementById('checkInstall');
                        if (installItem) installItem.classList.add('active');
                        var installLabel = document.getElementById('checkInstallLabel');
                        if (installLabel) installLabel.innerHTML = 'Run <strong>beatcue-installer.pkg</strong>';
                    }, 1500);
                }, 400);
            }

            var mobileShareBtn = document.getElementById('mobileShareBtn');
            var mobileShareText = document.getElementById('mobileShareText');
            var mobileCopyToast = document.getElementById('mobileCopyToast');

            // Send-to-computer analytics (Meta Pixel, Google Ads conversion,
            // PostHog) now fire from the landing page (index.html), where the
            // mobile share CTA lives — collapsing the old 2-hop flow into 1.
            // Left as a no-op so a direct /download mobile visit can still
            // copy/share the hand-off link without double-counting conversions.
            function trackSendToComputer(method) { /* events moved to index.html */ }

            function copyHandoffLink() {
                var url = buildDesktopHandoffUrl();
                return navigator.clipboard.writeText(url).then(function() {
                    if (mobileCopyToast) mobileCopyToast.classList.add('show');
                    if (mobileShareText) {
                        mobileShareText.textContent = 'Link copied!';
                        setTimeout(function() {
                            if (mobileCopyToast) mobileCopyToast.classList.remove('show');
                            mobileShareText.textContent = 'Share download link';
                        }, 6000);
                    }
                    trackSendToComputer('copy');
                });
            }

            if (mobileShareBtn) {
                // Prefer the OS share sheet when available (iOS/Android);
                // fall back to clipboard copy on desktop or unsupported browsers.
                if (!navigator.share) {
                    mobileShareText.textContent = 'Copy download link';
                }

                mobileShareBtn.addEventListener('click', function() {
                    var url = buildDesktopHandoffUrl();
                    if (navigator.share) {
                        // Share the URL only — including `text` makes most
                        // targets concatenate "text url" into one string.
                        navigator.share({
                            title: 'BeatCue',
                            url: url
                        }).then(function() {
                            trackSendToComputer('native_share');
                        }).catch(function(err) {
                            // User cancelled the sheet — don't treat as failure.
                            if (err && err.name === 'AbortError') return;
                            copyHandoffLink().catch(function() {});
                        });
                    } else {
                        copyHandoffLink().catch(function() {});
                    }
                });
            }
        }
        
        init();
    </script>
