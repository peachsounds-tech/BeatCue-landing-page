    <script>
        // Download URLs
        const DOWNLOAD_URLS = {
            macos: 'https://github.com/peachsounds-tech/cue-releases/releases/latest/download/Cue.pkg',
            windows: 'https://github.com/peachsounds-tech/cue-releases/releases/latest/download/Cue.exe'
        };
        
        // Platform display info
        const PLATFORM_INFO = {
            macos: { name: 'macOS' },
            windows: { name: 'Windows' }
        };

        // Track download event
        function trackDownload(platform) {
            if (typeof fbq === 'function') {
                fbq('track', 'StartTrial', {
                    value: '0.00',
                    currency: 'USD',
                    content_name: 'Cue',
                    platform: platform
                });
            }

            if (userConsented) {
                posthog.capture('trial_download_started', {
                    ...getBaseEventProps(),
                    page: 'download',
                    platform: platform,
                    source: 'free_trial_page'
                });
            } else {
                posthog.capture('trial_download_started', {
                    page: 'download',
                    platform: platform,
                    url: window.location.href
                });
            }
            console.log(`${platform} download tracked`);
        }
        
        // Setup UI for platform
        function setupUI(platform) {
            const isSupported = platform === 'macos' || platform === 'windows';
            const info = PLATFORM_INFO[platform];

            const pageTitleEl = document.getElementById('downloadPageTitle');

            if (isSupported) {
                document.getElementById('supportedContent').style.display = 'block';
                document.getElementById('unsupportedContent').style.display = 'none';
                if (pageTitleEl) pageTitleEl.textContent = 'Download Cue';

                const downloadBtn = document.getElementById('downloadBtn');
                const downloadBtnLabel = document.getElementById('downloadBtnLabel');

                downloadBtnLabel.textContent = `Download for ${info.name}`;
                downloadBtn.href = DOWNLOAD_URLS[platform];

                const downloadBtnIcon = document.getElementById('downloadBtnIcon');
                if (platform === 'windows' && downloadBtnIcon) {
                    downloadBtnIcon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12V6.75l8-1.25V12H3zm0 .5h8v6.5l-8-1.25V12.5zM11.5 5.39l9.5-1.64V12h-9.5V5.39zM11.5 12.5H21v7.75l-9.5-1.64V12.5z"/></svg>';
                }

                downloadBtn.addEventListener('click', function() {
                    trackDownload(platform);
                });

                const otherPlatform = platform === 'macos' ? 'windows' : 'macos';
                const otherInfo = PLATFORM_INFO[otherPlatform];
                document.getElementById('otherPlatform').innerHTML = 
                    `<a href="${DOWNLOAD_URLS[otherPlatform]}">Download for ${otherInfo.name}</a>`;
                
            } else {
                document.getElementById('supportedContent').style.display = 'none';
                document.getElementById('unsupportedContent').style.display = 'block';
                if (pageTitleEl) pageTitleEl.textContent = 'Download on desktop';
                var subtitleEl = document.getElementById('subtitle');
                if (subtitleEl) subtitleEl.textContent = 'Cue is a desktop app (Mac & Windows).';
                document.querySelector('.expectation-note').style.display = 'none';
            }
        }
        
        // Initialize
        function init() {
            const platform = detectedPlatform;
            console.log('Detected platform:', platform);
            
            setupUI(platform);

            // Mobile send-to-computer actions
            const mobileCopyBtn = document.getElementById('mobileCopyLink');
            const mobileCopyToast = document.getElementById('mobileCopyToast');
            const mobileWhatsApp = document.getElementById('mobileWhatsApp');
            const mobileEmailBtn = document.getElementById('mobileEmail');

            function trackSendToComputer(method) {
                if (typeof fbq === 'function') {
                    fbq('track', 'Lead', {
                        content_name: 'Cue Send to Desktop',
                        content_category: method
                    });
                }
                if (typeof posthog !== 'undefined' && posthog.capture) {
                    posthog.capture('send_to_computer', {
                        ...getBaseEventProps(),
                        method: method,
                        device: platform,
                        source: 'download_page'
                    });
                }
            }

            if (mobileCopyBtn) {
                mobileCopyBtn.addEventListener('click', function() {
                    const copyText = document.getElementById('mobileCopyText');
                    navigator.clipboard.writeText('https://gocue.app/download').then(function() {
                        mobileCopyToast.classList.add('show');
                        copyText.textContent = 'Copied!';
                        setTimeout(function() {
                            mobileCopyToast.classList.remove('show');
                            copyText.textContent = 'Open on your computer';
                        }, 6000);
                        trackSendToComputer('copy');
                    });
                });
            }

            if (mobileWhatsApp) {
                mobileWhatsApp.addEventListener('click', function() {
                    trackSendToComputer('whatsapp');
                });
            }

            if (mobileEmailBtn) {
                mobileEmailBtn.addEventListener('click', function() {
                    trackSendToComputer('email');
                });
            }
        }
        
        // Run on page load
        init();
    </script>
</body>
</html>
